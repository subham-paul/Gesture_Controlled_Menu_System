{% extends "base.html" %}
{% block title %}Contact — AirMenu{% endblock %}
{% block content %}

<style>
:root {
    --red: #E23744;
    --charcoal: #1B1B1B;
    --white: #FFFFFF;
}

/* ------------------- Banner ------------------- */
.contact-banner {
    margin-top: 20px;
    width: 100%;
    height: 45vh;
    background: var(--charcoal);
    border-radius: 20px;
    padding: 35px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    align-items: center;
    gap: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.30);
    color: var(--white);
}

.banner-text h1 {
    font-size: 3rem;
    font-weight: 800;
    color: var(--red);
}

.banner-text p {
    margin-top: 10px;
    opacity: 0.85;
    font-size: 1.15rem;
    max-width: 480px;
}

.banner-img img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.35);
}

/* ---------------- Contact Form + Map ---------------- */
.contact-wrapper {
    margin-top: 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 35px;
}

.form-card,
.map-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 25px;
    border-radius: 15px;
    color: var(--white);
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
}

.form-card h2 {
    color: var(--red);
    font-size: 2rem;
    margin-bottom: 20px;
}

label {
    font-size: 1rem;
    opacity: 0.9;
}

input,
select,
textarea {
    width: 100%;
    padding: 12px 14px;
    margin-top: 6px;
    margin-bottom: 18px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: var(--white);
}

textarea {
    height: 100px;
    resize: none;
}

button {
    width: 100%;
    padding: 14px;
    background: var(--red);
    color: var(--white);
    border: none;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* Map Card */
.map-card iframe {
    width: 100%;
    height: 100%;
    border-radius: 12px;
}
</style>

<!-- =======================
        BANNER
=========================== -->
<div class="contact-banner">

    <div class="banner-text">
        <h1>Contact Us</h1>
        <p>We’re here to help you with any support, queries, or partnership opportunities.</p>
    </div>

    <div class="banner-img">
        <img src="https://static.vecteezy.com/system/resources/previews/033/941/233/non_2x/a-plate-of-spaghetti-with-meat-and-vegetables-ai-generated-free-photo.jpg">
    </div>

</div>

<!-- =======================
   FORM + MAP SECTION
=========================== -->
<div class="contact-wrapper">

    <!-- FORM CARD -->
    <div class="form-card">
        <h2>Help Center</h2>

        <form>

            <label>Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Address</label>
            <input type="text" placeholder="Enter your address">

            <label>Phone Number</label>
            <input type="text" placeholder="Enter your phone number">

            <label>State</label>
            <input type="text" placeholder="Enter your state">

            <label>City</label>
            <input type="text" placeholder="Enter your city">

            <label>Message</label>
            <textarea placeholder="Write your message here..."></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- MAP CARD -->
    <div class="map-card">
        <iframe 
            src="https://maps.google.com/maps?q=kolkata&t=&z=13&ie=UTF8&iwloc=&output=embed">
        </iframe>
    </div>

</div>

{% endblock %}
